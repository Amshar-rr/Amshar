<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photos — Amshar</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Space+Grotesk:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

[data-theme="dark"]{
  --bg:#080810;--bg2:#0e0e1a;--bg3:#141424;
  --text:#f0eee8;--muted:#8a8799;--border:rgba(255,255,255,0.09);
  --card-bg:#0e0e1a;--nav-bg:rgba(8,8,16,0.92);
  --overlay-bg:rgba(8,8,16,0.98);
}
[data-theme="light"]{
  --bg:#f5f4f0;--bg2:#ffffff;--bg3:#eceae3;
  --text:#1a1a2e;--muted:#6b6980;--border:rgba(0,0,0,0.1);
  --card-bg:#ffffff;--nav-bg:rgba(245,244,240,0.95);
  --overlay-bg:rgba(245,244,240,0.98);
}
:root{
  --serif:'Playfair Display',Georgia,serif;
  --sans:'Space Grotesk',sans-serif;
  --mono:'JetBrains Mono',monospace;
  --pink:#ff2d78;--blue:#2d8eff;--orange:#ff6a00;
  --green:#00d97e;--red:#ff3b3b;--purple:#a855f7;
}

html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-weight:400;line-height:1.7;overflow-x:hidden;transition:background 0.4s,color 0.4s;}

::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--pink);border-radius:2px;}

/* ── NAV ── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  display:flex;justify-content:space-between;align-items:center;
  padding:1.2rem 4rem;
  background:var(--nav-bg);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  transition:background 0.4s;
}
.nav-logo{
  font-family:var(--serif);font-size:1.3rem;color:var(--text);
  text-decoration:none;display:flex;align-items:center;gap:0.5rem;
}
.nav-dot{
  width:8px;height:8px;border-radius:50%;
  background:linear-gradient(135deg,var(--pink),var(--blue));
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.5);}}

.nav-right{display:flex;align-items:center;gap:1rem;}

.back-btn{
  display:inline-flex;align-items:center;gap:0.5rem;
  font-family:var(--mono);font-size:0.65rem;letter-spacing:0.1em;
  text-transform:uppercase;color:var(--muted);text-decoration:none;
  padding:0.4rem 1rem;border:1px solid var(--border);border-radius:100px;
  background:var(--bg2);cursor:pointer;transition:all 0.25s;
}
.back-btn:hover{border-color:var(--pink);color:var(--text);}
.back-btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;}

.ctrl-btn{
  background:var(--bg2);border:1px solid var(--border);color:var(--muted);
  padding:0.35rem 0.75rem;border-radius:100px;font-family:var(--mono);
  font-size:0.6rem;letter-spacing:0.1em;cursor:pointer;transition:all 0.25s;
  display:flex;align-items:center;gap:0.4rem;text-transform:uppercase;border:none;
}
.ctrl-btn:hover{color:var(--text);}

/* ── PAGE WRAPPER ── */
.page{padding-top:80px;min-height:100vh;}

/* ── HERO HEADER ── */
.photos-header{
  padding:4rem 4rem 2rem;
  position:relative;overflow:hidden;
}
.photos-header-blob{
  position:absolute;border-radius:50%;filter:blur(80px);opacity:0.08;pointer-events:none;
}
.ph-blob1{width:400px;height:400px;background:var(--pink);top:-100px;right:0;}
.ph-blob2{width:300px;height:300px;background:var(--blue);bottom:-50px;left:10%;}

.photos-header-inner{max-width:1400px;margin:0 auto;position:relative;z-index:1;}

.ph-eyebrow{
  font-family:var(--mono);font-size:0.65rem;letter-spacing:0.25em;
  text-transform:uppercase;color:var(--muted);margin-bottom:0.8rem;
  display:flex;align-items:center;gap:0.6rem;
}
.ph-eyebrow::before{content:'';display:block;width:24px;height:1px;background:var(--pink);}

.ph-title{
  font-family:var(--serif);font-size:clamp(2.5rem,6vw,5rem);
  font-weight:700;line-height:1.1;margin-bottom:0.5rem;
  background:linear-gradient(135deg,var(--text) 30%,var(--pink) 70%,var(--blue));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.ph-subtitle{
  font-family:var(--mono);font-size:0.75rem;color:var(--muted);
  letter-spacing:0.1em;margin-bottom:2rem;
}

/* ── FILTER BAR ── */
.filter-bar{
  display:flex;align-items:center;gap:0.75rem;
  flex-wrap:wrap;
  padding:0 4rem 2rem;
  max-width:1400px;margin:0 auto;
  position:relative;z-index:10;
}
.filter-pill{
  font-family:var(--mono);font-size:0.62rem;letter-spacing:0.1em;
  text-transform:uppercase;color:var(--muted);
  padding:0.4rem 1.1rem;border:1px solid var(--border);
  border-radius:100px;background:var(--bg2);cursor:pointer;
  transition:all 0.25s;user-select:none;
}
.filter-pill:hover{border-color:var(--pink);color:var(--text);}
.filter-pill.active{
  border-color:var(--pink);color:var(--pink);
  background:rgba(255,45,120,0.08);
}

.filter-sep{width:1px;height:20px;background:var(--border);}

.view-toggle{display:flex;border:1px solid var(--border);border-radius:100px;overflow:hidden;background:var(--bg2);}
.view-btn{
  width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all 0.2s;background:none;border:none;color:var(--muted);
}
.view-btn:hover{color:var(--text);}
.view-btn.active{background:var(--pink);color:#fff;}
.view-btn svg{width:14px;height:14px;fill:currentColor;}

/* ── SEARCH ── */
.search-wrap{
  margin-left:auto;
  position:relative;
}
.search-input{
  font-family:var(--mono);font-size:0.65rem;letter-spacing:0.08em;
  background:var(--bg2);border:1px solid var(--border);color:var(--text);
  padding:0.4rem 1rem 0.4rem 2.2rem;border-radius:100px;
  outline:none;width:180px;transition:all 0.3s;
}
.search-input:focus{border-color:var(--pink);width:240px;}
.search-input::placeholder{color:var(--muted);}
.search-icon{
  position:absolute;left:0.7rem;top:50%;transform:translateY(-50%);
  pointer-events:none;
}
.search-icon svg{width:12px;height:12px;stroke:var(--muted);fill:none;stroke-width:2;}

/* ── STATS ROW ── */
.stats-row{
  display:flex;gap:2rem;
  padding:0 4rem 2.5rem;
  max-width:1400px;margin:0 auto;
}
.stat-item{display:flex;flex-direction:column;gap:0.1rem;}
.stat-num{
  font-family:var(--serif);font-size:1.8rem;font-style:italic;
  background:linear-gradient(135deg,var(--pink),var(--blue));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1;
}
.stat-label{font-family:var(--mono);font-size:0.6rem;color:var(--muted);letter-spacing:0.15em;text-transform:uppercase;}

/* ── MASONRY GRID ── */
.gallery-container{
  padding:0 3rem 4rem;
  max-width:1400px;
  margin:0 auto;
}

/* Google Photos-style masonry columns */
.masonry{
  columns:4 280px;
  column-gap:6px;
}
.masonry-item{
  break-inside:avoid;
  margin-bottom:6px;
  position:relative;
  cursor:pointer;
  overflow:hidden;
  border-radius:4px;
  background:var(--bg3);
}
.masonry-item img{
  width:100%;height:auto;
  display:block;
  transition:transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94);
  object-fit:cover;
}
.masonry-item:hover img{transform:scale(1.04);}

/* Photo overlay on hover */
.photo-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(0,0,0,0.4) 0%,transparent 30%,transparent 60%,rgba(0,0,0,0.6) 100%);
  opacity:0;transition:opacity 0.35s ease;
  display:flex;flex-direction:column;justify-content:space-between;
  padding:12px;
}
.masonry-item:hover .photo-overlay{opacity:1;}

.photo-top-actions{display:flex;justify-content:flex-end;gap:6px;}
.photo-action-btn{
  width:32px;height:32px;border-radius:50%;
  background:rgba(0,0,0,0.5);backdrop-filter:blur(8px);
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;color:#fff;
}
.photo-action-btn:hover{background:rgba(255,45,120,0.7);transform:scale(1.1);}
.photo-action-btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;}

.photo-bottom-info{
  font-family:var(--mono);font-size:0.58rem;color:rgba(255,255,255,0.8);
  letter-spacing:0.05em;
}
.photo-num{
  display:inline-block;background:rgba(255,255,255,0.15);backdrop-filter:blur(4px);
  padding:2px 8px;border-radius:100px;
}

/* Liked state */
.masonry-item.liked .like-btn{color:var(--pink);}
.masonry-item.liked .like-btn svg{fill:var(--pink);stroke:var(--pink);}

/* ── GRID VIEW ── */
.grid-view{
  display:none;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:4px;
}
.grid-view.active{display:grid;}
.masonry.grid-hidden{display:none;}

.grid-item{
  aspect-ratio:1;overflow:hidden;cursor:pointer;
  position:relative;border-radius:2px;
  background:var(--bg3);
}
.grid-item img{width:100%;height:100%;object-fit:cover;transition:transform 0.4s ease,filter 0.4s ease;}
.grid-item:hover img{transform:scale(1.06);filter:brightness(0.85);}
.grid-item .photo-overlay{display:flex;}
.grid-item:hover .photo-overlay{opacity:1;}

/* ── LIGHTBOX ── */
#lightbox{
  position:fixed;inset:0;z-index:1000;
  background:rgba(8,8,16,0.97);
  display:none;flex-direction:column;
  opacity:0;transition:opacity 0.3s ease;
}
#lightbox.open{display:flex;opacity:1;}

.lb-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:1rem 1.5rem;border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.lb-title{
  font-family:var(--serif);font-size:0.95rem;color:var(--text);
  display:flex;align-items:center;gap:0.8rem;
}
.lb-counter{
  font-family:var(--mono);font-size:0.65rem;color:var(--muted);
}
.lb-actions{display:flex;align-items:center;gap:0.5rem;}
.lb-btn{
  width:38px;height:38px;border-radius:50%;
  background:var(--bg2);border:1px solid var(--border);
  color:var(--muted);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;
}
.lb-btn:hover{border-color:var(--pink);color:var(--text);}
.lb-btn svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;}
.lb-close-btn{
  width:38px;height:38px;border-radius:50%;
  background:var(--bg2);border:1px solid var(--border);
  color:var(--muted);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;font-size:1.2rem;
}
.lb-close-btn:hover{border-color:var(--red);color:var(--red);}

.lb-body{
  flex:1;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;padding:1.5rem;
}
.lb-img-wrap{
  max-width:100%;max-height:100%;
  display:flex;align-items:center;justify-content:center;
  animation:lbPop 0.35s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes lbPop{from{transform:scale(0.88);opacity:0;}to{transform:scale(1);opacity:1;}}

#lb-img{
  max-width:100%;max-height:calc(100vh - 180px);
  object-fit:contain;border-radius:6px;
  box-shadow:0 30px 80px rgba(0,0,0,0.8);
  user-select:none;
}

.lb-nav{
  position:absolute;top:50%;transform:translateY(-50%);
  width:52px;height:52px;border-radius:50%;
  background:rgba(255,255,255,0.08);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.12);
  color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;z-index:10;
}
.lb-nav:hover{background:var(--pink);border-color:var(--pink);transform:translateY(-50%) scale(1.1);}
.lb-nav svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:2.5;}
.lb-prev{left:1rem;}
.lb-next{right:1rem;}

.lb-footer{
  padding:0.8rem 1.5rem;border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;gap:6px;
  flex-shrink:0;overflow-x:auto;
}
.lb-thumb{
  width:52px;height:52px;border-radius:4px;overflow:hidden;cursor:pointer;
  border:2px solid transparent;transition:all 0.2s;flex-shrink:0;
  background:var(--bg3);
}
.lb-thumb img{width:100%;height:100%;object-fit:cover;}
.lb-thumb.active{border-color:var(--pink);}
.lb-thumb:hover{border-color:rgba(255,45,120,0.5);}

/* ── FLOATING YEAR LABELS (Google Photos style) ── */
.year-section{margin-bottom:2.5rem;}
.year-label{
  font-family:var(--serif);font-size:1.4rem;font-style:italic;
  color:var(--text);margin-bottom:1rem;
  display:flex;align-items:center;gap:1rem;
}
.year-label::after{content:'';flex:1;height:1px;background:var(--border);}

/* ── RIBBON ── */
.rbtn{
  position:relative;display:inline-block;padding:0.85rem 2rem;
  font-family:var(--mono);font-size:0.72rem;letter-spacing:0.15em;
  text-transform:uppercase;text-decoration:none;color:var(--text);
  background:var(--bg2);border:none;cursor:pointer;border-radius:4px;z-index:0;
  transition:color 0.3s,transform 0.2s;
}
.rbtn::before{
  content:'';position:absolute;inset:-2px;border-radius:6px;
  background:linear-gradient(90deg,var(--pink),var(--blue),var(--orange),var(--green),var(--red),var(--purple),var(--pink));
  background-size:300% 100%;animation:rborder 3s linear infinite;z-index:-1;
}
.rbtn::after{content:'';position:absolute;inset:2px;background:var(--bg2);border-radius:3px;z-index:-1;}
.rbtn:hover{color:#fff;transform:translateY(-1px);}
@keyframes rborder{0%{background-position:0% 50%;}100%{background-position:300% 50%;}}

/* ── EMPTY / PLACEHOLDER states ── */
.photo-placeholder{
  background:linear-gradient(135deg,var(--bg2),var(--bg3));
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:0.5rem;
  color:var(--muted);
  font-family:var(--mono);font-size:0.65rem;
  letter-spacing:0.1em;
  min-height:200px;
  text-align:center;
  padding:1rem;
}
.photo-placeholder .ph-icon{font-size:2rem;opacity:0.4;}

/* ── SCROLL REVEAL ── */
.masonry-item,.grid-item{
  opacity:0;transform:translateY(16px);
  animation:revealUp 0.5s ease forwards;
}
@keyframes revealUp{to{opacity:1;transform:translateY(0);}}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--bg2);border:1px solid var(--border);
  font-family:var(--mono);font-size:0.65rem;letter-spacing:0.1em;
  color:var(--text);padding:0.6rem 1.5rem;border-radius:100px;
  opacity:0;pointer-events:none;z-index:2000;
  transition:all 0.3s ease;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  nav{padding:1rem 1.5rem;}
  .photos-header{padding:3rem 1.5rem 1.5rem;}
  .filter-bar{padding:0 1.5rem 1.5rem;}
  .stats-row{padding:0 1.5rem 2rem;}
  .gallery-container{padding:0 1rem 3rem;}
  .masonry{columns:2 140px;column-gap:4px;}
  .masonry-item{margin-bottom:4px;}
  .lb-footer{display:none;}
  .lb-body{padding:0.5rem;}
  #lb-img{max-height:calc(100vh - 120px);}
  .search-wrap{display:none;}
}
@media(max-width:480px){
  .stats-row{flex-wrap:wrap;gap:1.2rem;}
  .filter-bar{gap:0.5rem;}
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="index-4.html" class="nav-logo">
    <div class="nav-dot"></div>
    Amshar
  </a>
  <div class="nav-right">
    <a href="index.html" class="back-btn">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Back
    </a>
    <button class="ctrl-btn" onclick="toggleTheme()" id="themeBtn">🌙 Dark</button>
  </div>
</nav>

<div class="page">

  <!-- HEADER -->
  <div class="photos-header">
    <div class="ph-blob1 photos-header-blob"></div>
    <div class="ph-blob2 photos-header-blob"></div>
    <div class="photos-header-inner">
      <div class="ph-eyebrow">Visual Archive</div>
      <h1 class="ph-title">My Photos</h1>
      <p class="ph-subtitle">// 24 moments captured in time</p>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-item">
      <span class="stat-num" id="total-count">24</span>
      <span class="stat-label">Photos</span>
    </div>
    <div class="stat-item">
      <span class="stat-num" id="liked-count">0</span>
      <span class="stat-label">Favourites</span>
    </div>
    <div class="stat-item">
      <span class="stat-num">∞</span>
      <span class="stat-label">Memories</span>
    </div>
  </div>

  <!-- FILTER & CONTROLS BAR -->
  <div class="filter-bar">
    <button class="filter-pill active" onclick="filterPhotos('all',this)">All</button>
    <button class="filter-pill" onclick="filterPhotos('liked',this)">❤ Favourites</button>

    <div class="filter-sep"></div>

    <div class="view-toggle">
      <button class="view-btn active" id="masonryBtn" onclick="setView('masonry')" title="Masonry">
        <svg viewBox="0 0 16 16"><rect x="1" y="1" width="6" height="4"/><rect x="9" y="1" width="6" height="6"/><rect x="1" y="7" width="6" height="8"/><rect x="9" y="9" width="6" height="6"/></svg>
      </button>
      <button class="view-btn" id="gridBtn" onclick="setView('grid')" title="Grid">
        <svg viewBox="0 0 16 16"><rect x="1" y="1" width="6" height="6"/><rect x="9" y="1" width="6" height="6"/><rect x="1" y="9" width="6" height="6"/><rect x="9" y="9" width="6" height="6"/></svg>
      </button>
    </div>

    <div class="search-wrap">
      <div class="search-icon">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </div>
      <input class="search-input" type="text" placeholder="Search photos..." id="searchInput" oninput="filterSearch()">
    </div>
  </div>

  <!-- GALLERY -->
  <div class="gallery-container">

    <!-- MASONRY VIEW -->
    <div class="masonry" id="masonryGrid">
    </div>

    <!-- GRID VIEW -->
    <div class="grid-view" id="gridView">
    </div>

  </div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <div class="lb-header">
    <div class="lb-title">
      <span id="lb-name">photo1.png</span>
      <span class="lb-counter" id="lb-counter">1 / 24</span>
    </div>
    <div class="lb-actions">
      <button class="lb-btn" onclick="lbLike()" title="Favourite" id="lb-like-btn">
        <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </button>
      <button class="lb-btn" onclick="lbDownload()" title="Download">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </button>
      <button class="lb-btn" onclick="lbShare()" title="Share">
        <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      </button>
      <button class="lb-close-btn" onclick="closeLightbox()" title="Close">✕</button>
    </div>
  </div>

  <div class="lb-body">
    <button class="lb-nav lb-prev" onclick="lbNav(-1)">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="lb-img-wrap" id="lbImgWrap">
      <img id="lb-img" src="" alt="Photo">
    </div>
    <button class="lb-nav lb-next" onclick="lbNav(1)">
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>

  <div class="lb-footer" id="lbThumbs">
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── DATA ──
const TOTAL = 24;
const driveIds = [
  '1yIrRemmgBb_ww1qDlB9hCNVwoe3SDGky',
  '1WOL6yNZeg9mnx2WdR8444ZcOz_Kw_vmp',
  '1ayLjXBIb5J9uDB64_SB4lU3F_69QWddv',
  '1W2MXpcy0xvkKPlVpqexfKfgXyXCmcSY7',
  '1MOEY12zim-4lx_jdse-HAAcxmDy_khrU',
  '1-jtRcwsDDEbctpMRehjVyj7Pk4ypjO3Y',
  '1LDx5JKabN11HLmWr-MaPYExAOW7NChfx',
  '1pbf0D9phxBSQ3Ypw0ur_9p4sE0vSNBxa',
  '18iTn8y64HY8PeVWRZrXz0mq4CYl0mDGc',
  '13pEOsVBTEm8NtAvCGEvADnux6eJogO9s',
  '1l-sivQt9aUSSyGVzMmuxaXOww5AHsldf',
  '1MuYbeuLI5q_wWfvE9wrbD9Hj6NY07xrQ',
  '1sLPi6b0ZQCZ9GxGfLfJvfEdxrMf2xQDg',
  '1odl1QB98QfZiUIztiYxek1L3LBY_VfNV',
  '1My34TJGwTAVaildUNeXDJ6yQHD5mWKC5',
  '1DQwCLgkRLzz5f9MLOkxCE7ok9NcgZkWP',
  '1_uakXL4UOhFf9eW9UldMENTYE80x9mz1',
  '18KM5e3Uo7FsAH5QnwqxRB6EsD37q6eIU',
  '1PqfBZ5fowMHMiGqbH2sAHgkNxbZYXWhi',
  '13O2hJn0vfJCKLMIcCVdPq2Uz9f3yIUoP',
  '1GwkhTtZZ0lN3Ecjczie9nWb17ZH4eB1s',
  '1Vm9-sd91hkf_nwNq52EiaUBevRxpgGnW',
  '1KSBV7F4Wqkese2wI7Z-VYabaWwHVDQpX',
  '1NzrKQ44jfmfZhXcNU6Jlw1L7XZtITXk9'
];
let photos = driveIds.map((id, i) => ({
  id: i+1,
  src: `https://lh3.googleusercontent.com/d/${id}`,
  name: `Photo ${i+1}`,
  liked: false,
  visible: true
}));

// Varied heights for masonry feel
const heights = [220,300,260,340,200,280,320,240,300,180,350,260,220,290,240,310,200,270,330,210,280,250,320,190];

let currentView = 'masonry';
let lightboxIdx = 0;
let filteredPhotos = [...photos];

// ── BUILD GRIDS ──
function buildGrids(){
  const masonry = document.getElementById('masonryGrid');
  const gridV   = document.getElementById('gridView');
  masonry.innerHTML = '';
  gridV.innerHTML   = '';

  filteredPhotos.forEach((p, idx) => {
    const delay = (idx % 8) * 60;

    // MASONRY ITEM
    const mi = document.createElement('div');
    mi.className = 'masonry-item' + (p.liked?' liked':'');
    mi.dataset.id = p.id;
    mi.style.animationDelay = delay+'ms';
    mi.innerHTML = `
      <img src="${p.src}" alt="${p.name}" style="min-height:${heights[p.id-1]}px;"
           onerror="this.parentElement.innerHTML='<div class=\\'photo-placeholder\\'><div class=\\'ph-icon\\'>📷</div><div>photo${p.id}.png</div></div>'">
      <div class="photo-overlay">
        <div class="photo-top-actions">
          <button class="photo-action-btn like-btn" onclick="toggleLike(event,${p.id})" title="Favourite">
            <svg viewBox="0 0 24 24" style="${p.liked?'fill:var(--pink);stroke:var(--pink)':'fill:none;stroke:#fff'}">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
          </button>
          <button class="photo-action-btn" onclick="openLightbox(event,${filteredPhotos.indexOf(p)})" title="Expand">
            <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
              <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
              <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
            </svg>
          </button>
        </div>
        <div class="photo-bottom-info">
          <span class="photo-num">№ ${p.id}</span>
        </div>
      </div>
    `;
    mi.addEventListener('click', function(e){
      if(!e.target.closest('.photo-action-btn')) openLightbox(e, filteredPhotos.indexOf(p));
    });
    masonry.appendChild(mi);

    // GRID ITEM
    const gi = document.createElement('div');
    gi.className = 'grid-item' + (p.liked?' liked':'');
    gi.dataset.id = p.id;
    gi.style.animationDelay = delay+'ms';
    gi.innerHTML = `
      <img src="${p.src}" alt="${p.name}"
           onerror="this.style.display='none'">
      <div class="photo-overlay">
        <div class="photo-top-actions">
          <button class="photo-action-btn like-btn" onclick="toggleLike(event,${p.id})" title="Favourite">
            <svg viewBox="0 0 24 24" style="${p.liked?'fill:var(--pink);stroke:var(--pink)':'fill:none;stroke:#fff'}">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
          </button>
        </div>
        <div class="photo-bottom-info"><span class="photo-num">№ ${p.id}</span></div>
      </div>
    `;
    gi.addEventListener('click', function(e){
      if(!e.target.closest('.photo-action-btn')) openLightbox(e, filteredPhotos.indexOf(p));
    });
    gridV.appendChild(gi);
  });

  // Build lightbox thumbnails
  buildLbThumbs();
  updateStats();
}

// ── LIGHTBOX THUMBS ──
function buildLbThumbs(){
  const c = document.getElementById('lbThumbs');
  c.innerHTML = '';
  filteredPhotos.forEach((p,i)=>{
    const t = document.createElement('div');
    t.className = 'lb-thumb' + (i===lightboxIdx?' active':'');
    t.innerHTML = `<img src="${p.src}" alt="${p.name}" onerror="this.style.opacity=0.3">`;
    t.onclick = ()=>{ lightboxIdx=i; showLb(); };
    c.appendChild(t);
  });
}

// ── LIGHTBOX ──
function openLightbox(e, idx){
  if(e) e.stopPropagation();
  lightboxIdx = idx;
  const lb = document.getElementById('lightbox');
  lb.style.display = 'flex';
  setTimeout(()=>lb.classList.add('open'),10);
  showLb();
  document.addEventListener('keydown', lbKeyHandler);
}

function showLb(){
  const p = filteredPhotos[lightboxIdx];
  if(!p) return;

  const imgEl = document.getElementById('lb-img');
  const wrap = document.getElementById('lbImgWrap');
  // Pop animation reset
  wrap.style.animation = 'none';
  wrap.offsetHeight;
  wrap.style.animation = '';

  imgEl.src = p.src;
  document.getElementById('lb-name').textContent = p.name;
  document.getElementById('lb-counter').textContent = (lightboxIdx+1)+' / '+filteredPhotos.length;

  // Like button state
  const lbLikeBtn = document.getElementById('lb-like-btn');
  const svg = lbLikeBtn.querySelector('svg path');
  if(p.liked){ svg.style.fill='var(--pink)'; svg.style.stroke='var(--pink)'; }
  else{ svg.style.fill='none'; svg.style.stroke='currentColor'; }

  // Update thumbs
  document.querySelectorAll('.lb-thumb').forEach((t,i)=>t.classList.toggle('active',i===lightboxIdx));
  // Scroll active thumb into view
  const at = document.querySelectorAll('.lb-thumb')[lightboxIdx];
  if(at) at.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
}

function closeLightbox(){
  const lb = document.getElementById('lightbox');
  lb.classList.remove('open');
  setTimeout(()=>lb.style.display='none',300);
  document.removeEventListener('keydown', lbKeyHandler);
}

function lbNav(dir){
  lightboxIdx = (lightboxIdx + dir + filteredPhotos.length) % filteredPhotos.length;
  showLb();
}

function lbKeyHandler(e){
  if(e.key==='ArrowLeft') lbNav(-1);
  else if(e.key==='ArrowRight') lbNav(1);
  else if(e.key==='Escape') closeLightbox();
  else if(e.key==='l'||e.key==='L') lbLike();
}

// ── SWIPE SUPPORT ──
let touchStart=0;
document.getElementById('lightbox').addEventListener('touchstart',e=>touchStart=e.touches[0].clientX);
document.getElementById('lightbox').addEventListener('touchend',e=>{
  const diff=touchStart-e.changedTouches[0].clientX;
  if(Math.abs(diff)>50) lbNav(diff>0?1:-1);
});

// ── LIKE ──
function toggleLike(e, id){
  e.stopPropagation();
  const p = photos.find(x=>x.id===id);
  if(!p) return;
  p.liked = !p.liked;
  buildGrids();
  showToast(p.liked ? '❤ Added to Favourites' : 'Removed from Favourites');
}

function lbLike(){
  const p = filteredPhotos[lightboxIdx];
  if(!p) return;
  const orig = photos.find(x=>x.id===p.id);
  if(orig) orig.liked = !orig.liked;
  p.liked = orig ? orig.liked : !p.liked;

  const lbLikeBtn = document.getElementById('lb-like-btn');
  const svg = lbLikeBtn.querySelector('svg path');
  if(p.liked){ svg.style.fill='var(--pink)'; svg.style.stroke='var(--pink)'; }
  else{ svg.style.fill='none'; svg.style.stroke='currentColor'; }

  updateStats();
  showToast(p.liked ? '❤ Added to Favourites' : 'Removed from Favourites');
}

// ── DOWNLOAD ──
function lbDownload(){
  const p = filteredPhotos[lightboxIdx];
  if(!p) return;
  const a = document.createElement('a');
  a.href = p.src; a.download = p.name; a.click();
  showToast('⬇ Downloading '+p.name);
}

// ── SHARE ──
function lbShare(){
  const p = filteredPhotos[lightboxIdx];
  if(!p) return;
  if(navigator.share){
    navigator.share({title:'Photo by Amshar',url:window.location.href}).catch(()=>{});
  } else {
    navigator.clipboard.writeText(window.location.href).then(()=>showToast('🔗 Link copied!'));
  }
}

// ── FILTER ──
let activeFilter = 'all';
function filterPhotos(type, btn){
  activeFilter = type;
  document.querySelectorAll('.filter-pill').forEach(p=>p.classList.remove('active'));
  if(btn) btn.classList.add('active');
  applyFilters();
}

function filterSearch(){
  applyFilters();
}

function applyFilters(){
  const q = document.getElementById('searchInput').value.toLowerCase();
  filteredPhotos = photos.filter(p=>{
    const matchFilter = activeFilter==='all' || (activeFilter==='liked'&&p.liked);
    const matchSearch = !q || p.name.toLowerCase().includes(q) || String(p.id).includes(q);
    return matchFilter && matchSearch;
  });
  buildGrids();
}

// ── VIEW TOGGLE ──
function setView(v){
  currentView = v;
  const masonry = document.getElementById('masonryGrid');
  const gridV   = document.getElementById('gridView');
  const mBtn    = document.getElementById('masonryBtn');
  const gBtn    = document.getElementById('gridBtn');

  if(v==='masonry'){
    masonry.classList.remove('grid-hidden');
    gridV.classList.remove('active');
    mBtn.classList.add('active'); gBtn.classList.remove('active');
  } else {
    masonry.classList.add('grid-hidden');
    gridV.classList.add('active');
    gBtn.classList.add('active'); mBtn.classList.remove('active');
  }
}

// ── STATS ──
function updateStats(){
  const liked = photos.filter(p=>p.liked).length;
  document.getElementById('total-count').textContent = TOTAL;
  document.getElementById('liked-count').textContent = liked;
}

// ── TOAST ──
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.remove('show'),2500);
}

// ── THEME ──
function toggleTheme(){
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme')==='dark';
  html.setAttribute('data-theme', isDark?'light':'dark');
  document.getElementById('themeBtn').textContent = isDark?'☀ Light':'🌙 Dark';
  localStorage.setItem('theme', isDark?'light':'dark');
}
(function(){
  const saved = localStorage.getItem('theme');
  if(saved){
    document.documentElement.setAttribute('data-theme',saved);
    document.getElementById('themeBtn').textContent = saved==='dark'?'🌙 Dark':'☀ Light';
  }
})();

// ── INIT ──
buildGrids();
</script>
</body>
</html>
